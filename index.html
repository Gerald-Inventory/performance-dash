<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSR Mobile Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; }
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); margin: 0; padding: 10px; color: var(--primary); 
        }

        .header-box { text-align: center; margin-bottom: 15px; }
        h1 { font-size: 1.4rem; margin: 0; color: var(--primary); }
        #status { font-size: 11px; color: #64748b; margin-top: 5px; padding: 6px; border-radius: 6px; display: inline-block; }
        .error-status { background: #fee2e2; color: #b91c1c !important; font-weight: bold; border: 1px solid #fecaca; }
        .success-status { background: #dcfce7; color: #166534 !important; }

        .period-flex { display: flex; gap: 10px; margin-bottom: 15px; }
        .period-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; 
            font-weight: 800; background: #cbd5e1; cursor: pointer;
        }
        .period-btn.active { background: var(--accent); color: white; }

        /* KPI Tiles Grid */
        .tiles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tile-card {
            background: white; padding: 12px 15px; border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; flex-direction: column;
        }
        .tile-val { font-size: 1.3rem; font-weight: 800; margin-top: 4px; color: var(--primary); }
        .tile-accent { color: var(--accent); }

        .controls-card {
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 15px;
            display: grid; grid-template-columns: 1fr; gap: 12px;
        }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
        
        select[multiple] { 
            padding: 8px; border-radius: 10px; border: 1px solid #e2e8f0; 
            font-size: 15px; background-color: #f8fafc; min-height: 100px;
        }
        .select-help { font-size: 9px; color: #94a3b8; margin-top: 2px; text-transform: none; font-weight: normal; }

        .table-wrapper {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 11px; color: #64748b; border-bottom: 1px solid #f1f5f9; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; }
        
        .sub-bold { font-weight: 800; font-size: 15px; color: var(--primary); display: block; }
        .class-muted { font-size: 12px; color: #64748b; display: block; margin-top: 2px; }
        
        .val-num { text-align: right; font-weight: 800; font-size: 15px; }
        .growth-pill { 
            display: inline-block; padding: 2px 8px; border-radius: 6px; 
            font-size: 11px; font-weight: 700; margin-top: 4px;
        }
        .pos { background: #dcfce7; color: #166534; }
        .neg { background: #fee2e2; color: #991b1b; }
        
        /* Calculated Summary Matrix Totals Footer */
        .total-row { background: #f8fafc; border-top: 2px solid #e2e8f0; }
        .total-row td { padding: 16px 12px; }
    </style>
</head>
<body>

<div class="header-box">
    <h1>DSR Analysis</h1>
    <div id="status">Syncing live dataset from GitHub...</div>
</div>

<div class="period-flex">
    <button class="period-btn active" id="btnMTD" onclick="setPeriod('MTD')">MTD</button>
    <button class="period-btn" id="btnYTD" onclick="setPeriod('YTD')">YTD</button>
</div>

<!-- Dynamic Calculated KPI Summary Tiles -->
<div class="tiles-grid">
    <div class="tile-card">
        <label>CY Sale Value</label>
        <div id="tileCySales" class="tile-val tile-accent">0</div>
    </div>
    <div class="tile-card">
        <label>Total SPD</label>
        <div id="tileTotalSpd" class="tile-val">0</div>
    </div>
</div>

<div class="controls-card">
    <div class="control-group">
        <label>Division <span class="select-help">(Tap items to cross-filter)</span></label>
        <select id="divSlicer" onchange="handleDivChange()" multiple><option>Loading options...</option></select>
    </div>
    <div class="control-group">
        <label>Department <span class="select-help">(Multi-select active)</span></label>
        <select id="deptSlicer" onchange="handleDeptChange()" multiple><option>All</option></select>
    </div>
    <div class="control-group">
        <label>Class <span class="select-help">(Multi-select active)</span></label>
        <select id="classSlicer" onchange="handleClassChange()" multiple><option>All</option></select>
    </div>
    <div class="control-group">
        <label>Subclass <span class="select-help">(Multi-select active)</span></label>
        <select id="subclassSlicer" onchange="applyFilters()" multiple><option>All</option></select>
    </div>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>Subclass / Class</th>
                <th style="text-align:right">SPD & Growth</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="2" style="text-align:center; padding: 40px; color: #94a3b8;">Processing data streams...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let rawData = [];
    let currentPeriod = 'MTD';

    const cleanNum = (v) => v ? parseFloat(v.toString().replace(/,/g, '').replace(/%/g, '')) || 0 : 0;

    // Direct background synchronization with your repository's root dsr.csv
    window.addEventListener('DOMContentLoaded', () => {
        Papa.parse("dsr.csv", {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data.filter(row => row.Division);
                
                if(rawData.length === 0) {
                    updateStatus("❌ Error: File found but 'Division' column signature is missing.", true);
                    return;
                }

                updateStatus("✅ Live Data Synchronized", false);
                initFilters();
            },
            error: function(err) {
                console.error(err);
                updateStatus("❌ Error: Cannot pull dsr.csv from repository root path.", true);
            }
        });
    });

    function updateStatus(msg, isError) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = msg;
        statusDiv.className = isError ? 'error-status' : 'success-status';
    }

    function setPeriod(p) {
        currentPeriod = p;
        document.getElementById('btnMTD').classList.toggle('active', p === 'MTD');
        document.getElementById('btnYTD').classList.toggle('active', p === 'YTD');
        applyFilters();
    }

    // Helper map extraction function for native multi-select options
    function getSelectedValues(id) {
        const select = document.getElementById(id);
        const values = Array.from(select.selectedOptions).map(opt => opt.value);
        if (values.length === 0 || values.includes('All')) return ['All'];
        return values;
    }

    function initFilters() {
        const divs = [...new Set(rawData.map(r => r.Division))].filter(Boolean).sort();
        populateSelect('divSlicer', divs, "All Divisions");
        handleDivChange();
    }

    function handleDivChange() {
        const divs = getSelectedValues('divSlicer');
        const filtered = divs.includes('All') ? rawData : rawData.filter(r => divs.includes(r.Division));
        
        const depts = [...new Set(filtered.map(r => r['Dept Name']))].filter(Boolean).sort();
        populateSelect('deptSlicer', depts, "All Departments");
        handleDeptChange();
    }

    function handleDeptChange() {
        const divs = getSelectedValues('divSlicer');
        const depts = getSelectedValues('deptSlicer');
        
        let filtered = divs.includes('All') ? rawData : rawData.filter(r => divs.includes(r.Division));
        if (!depts.includes('All')) filtered = filtered.filter(r => depts.includes(r['Dept Name']));
        
        const classes = [...new Set(filtered.map(r => r['Class name']))].filter(Boolean).sort();
        populateSelect('classSlicer', classes, "All Classes");
        handleClassChange();
    }

    function handleClassChange() {
        const divs = getSelectedValues('divSlicer');
        const depts = getSelectedValues('deptSlicer');
        const classes = getSelectedValues('classSlicer');
        
        let filtered = divs.includes('All') ? rawData : rawData.filter(r => divs.includes(r.Division));
        if (!depts.includes('All')) filtered = filtered.filter(r => depts.includes(r['Dept Name']));
        if (!classes.includes('All')) filtered = filtered.filter(r => classes.includes(r['Class name']));
        
        const subClasses = [...new Set(filtered.map(r => r['Subclass Name']))].filter(Boolean).sort();
        populateSelect('subclassSlicer', subClasses, "All Subclasses");
        applyFilters();
    }

    function populateSelect(id, items, defaultText) {
        const s = document.getElementById(id);
        s.innerHTML = `<option value="All" selected>${defaultText}</option>`;
        items.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item; opt.textContent = item;
            s.appendChild(opt);
        });
    }

    function applyFilters() {
        if(rawData.length === 0) return;

        const divs = getSelectedValues('divSlicer');
        const depts = getSelectedValues('deptSlicer');
        const classes = getSelectedValues('classSlicer');
        const subs = getSelectedValues('subclassSlicer');

        let filtered = rawData.filter(row => {
            return (divs.includes('All') || divs.includes(row.Division)) &&
                   (depts.includes('All') || depts.includes(row['Dept Name'])) &&
                   (classes.includes('All') || classes.includes(row['Class name'])) &&
                   (subs.includes('All') || subs.includes(row['Subclass Name'])) &&
                   (String(row.Year).toUpperCase() === currentPeriod);
        });

        // Compute live values for KPI Metrics Display cards
        const totalCySales = filtered.reduce((sum, r) => sum + cleanNum(r.Cy_Sale_Value), 0);
        const totalSpd = filtered.reduce((sum, r) => sum + cleanNum(r.SPD), 0);
        
        document.getElementById('tileCySales').innerText = totalCySales.toLocaleString(undefined, {maximumFractionDigits: 0});
        document.getElementById('tileTotalSpd').innerText = totalSpd.toLocaleString(undefined, {maximumFractionDigits: 0});

        renderTable(filtered);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding: 30px;">No match for criteria.</td></tr>';
            return;
        }

        let totalSpd = 0;
        let runningGrowthSum = 0;

        data.forEach(row => {
            const spd = cleanNum(row.SPD);
            const growth = cleanNum(row['Growth%']);
            
            totalSpd += spd;
            runningGrowthSum += growth;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <span class="sub-bold">${row['Subclass Name'] || 'N/A'}</span>
                    <span class="class-muted">${row['Class name'] || 'N/A'}</span>
                </td>
                <td class="val-num">
                    <div>${spd.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
                    <div class="growth-pill ${growth >= 0 ? 'pos' : 'neg'}">
                        ${growth >= 0 ? '▲' : '▼'} ${Math.abs(growth).toFixed(1)}%
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        // Append bottom total aggregation matrix block
        const avgGrowth = runningGrowthSum / data.length;
        const trTotal = document.createElement('tr');
        trTotal.className = 'total-row';
        trTotal.innerHTML = `
            <td>
                <span class="sub-bold">TOTAL</span>
                <span class="class-muted">${data.length} intersections calculated</span>
            </td>
            <td class="val-num">
                <div>${totalSpd.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
                <div class="growth-pill ${avgGrowth >= 0 ? 'pos' : 'neg'}">
                    ${avgGrowth >= 0 ? '▲' : '▼'} ${Math.abs(avgGrowth).toFixed(1)}%
                </div>
            </td>
        `;
        tbody.appendChild(trTotal);
    }
</script>

</body>
</html>
