<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSR Live Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; }
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); margin: 0; padding: 10px; color: var(--primary); 
        }

        .header-box { text-align: center; margin-bottom: 15px; padding: 10px; }
        h1 { font-size: 1.4rem; margin: 0; color: var(--primary); }
        #status { font-size: 12px; color: #64748b; margin-top: 5px; }

        /* Period Switcher */
        .period-flex { display: flex; gap: 10px; margin-bottom: 15px; }
        .period-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; 
            font-weight: 800; background: #e2e8f0; cursor: pointer; transition: 0.2s;
        }
        .period-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4); }

        /* Controls Area */
        .controls-card {
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 15px;
            display: grid; grid-template-columns: 1fr; gap: 12px;
        }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; margin-left: 2px; }
        select { 
            padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; 
            font-size: 16px; background-color: #f8fafc; color: var(--primary);
            appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center; background-size: 1em;
        }

        /* Table Area */
        .table-wrapper {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; color: #64748b; border-bottom: 1px solid #f1f5f9; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        .class-name { font-weight: 700; font-size: 14px; color: var(--primary); }
        .sub-name { font-size: 12px; color: #64748b; }
        .val-num { text-align: right; font-weight: 800; font-size: 15px; }
        .growth-pill { 
            display: inline-block; padding: 2px 8px; border-radius: 6px; 
            font-size: 11px; font-weight: 700; margin-top: 4px;
        }
        .pos { background: #dcfce7; color: #166534; }
        .neg { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="header-box">
    <h1>DSR Analysis</h1>
    <div id="status">Syncing with GitHub...</div>
</div>

<div class="period-flex">
    <button class="period-btn active" id="btnMTD" onclick="setPeriod('MTD')">MTD</button>
    <button class="period-btn" id="btnYTD" onclick="setPeriod('YTD')">YTD</button>
</div>

<div class="controls-card">
    <div class="control-group">
        <label>Division</label>
        <select id="divSlicer" onchange="handleDivChange()"><option>Loading...</option></select>
    </div>
    <div class="control-group">
        <label>Department</label>
        <select id="deptSlicer" onchange="handleDeptChange()"><option>All</option></select>
    </div>
    <div class="control-group">
        <label>Class</label>
        <select id="classSlicer" onchange="handleClassChange()"><option>All</option></select>
    </div>
    <div class="control-group">
        <label>Subclass</label>
        <select id="subclassSlicer" onchange="applyFilters()"><option>All</option></select>
    </div>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>Product Hierarchy</th>
                <th style="text-align:right">Performance</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="2" style="text-align:center; padding: 40px; color: #94a3b8;">Fetching data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let rawData = [];
    let currentPeriod = 'MTD';

    const cleanNum = (v) => v ? parseFloat(v.toString().replace(/,/g, '').replace(/%/g, '')) || 0 : 0;

    // STEP 1: AUTO-LOAD FROM GITHUB
    window.addEventListener('DOMContentLoaded', () => {
        Papa.parse("dsr.csv", {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data.filter(row => row.Division);
                if(rawData.length > 0) {
                    document.getElementById('status').innerText = "Updated: " + new Date().toLocaleTimeString();
                    initFilters();
                } else {
                    document.getElementById('status').innerText = "Error: dsr.csv is empty or missing Division column";
                }
            },
            error: function() {
                document.getElementById('status').innerText = "Error: Could not find dsr.csv in GitHub";
            }
        });
    });

    function setPeriod(p) {
        currentPeriod = p;
        document.getElementById('btnMTD').classList.toggle('active', p === 'MTD');
        document.getElementById('btnYTD').classList.toggle('active', p === 'YTD');
        applyFilters();
    }

    function initFilters() {
        const divs = [...new Set(rawData.map(r => r.Division))].filter(Boolean).sort();
        populateSelect('divSlicer', divs, "All Divisions");
        handleDivChange();
    }

    function handleDivChange() {
        const div = document.getElementById('divSlicer').value;
        const filtered = (div === 'All') ? rawData : rawData.filter(r => r.Division === div);
        const depts = [...new Set(filtered.map(r => r['Dept Name']))].filter(Boolean).sort();
        populateSelect('deptSlicer', depts, "All Departments");
        handleDeptChange();
    }

    function handleDeptChange() {
        const div = document.getElementById('divSlicer').value;
        const dept = document.getElementById('deptSlicer').value;
        let filtered = (div === 'All') ? rawData : rawData.filter(r => r.Division === div);
        if (dept !== 'All') filtered = filtered.filter(r => r['Dept Name'] === dept);
        const classes = [...new Set(filtered.map(r => r['Class name']))].filter(Boolean).sort();
        populateSelect('classSlicer', classes, "All Classes");
        handleClassChange();
    }

    function handleClassChange() {
        const div = document.getElementById('divSlicer').value;
        const dept = document.getElementById('deptSlicer').value;
        const cls = document.getElementById('classSlicer').value;
        let filtered = (div === 'All') ? rawData : rawData.filter(r => r.Division === div);
        if (dept !== 'All') filtered = filtered.filter(r => r['Dept Name'] === dept);
        if (cls !== 'All') filtered = filtered.filter(r => r['Class name'] === cls);
        const subClasses = [...new Set(filtered.map(r => r['Subclass Name']))].filter(Boolean).sort();
        populateSelect('subclassSlicer', subClasses, "All Subclasses");
        applyFilters();
    }

    function populateSelect(id, items, defaultText) {
        const s = document.getElementById(id);
        s.innerHTML = `<option value="All">${defaultText}</option>`;
        items.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item; opt.textContent = item;
            s.appendChild(opt);
        });
    }

    function applyFilters() {
        const div = document.getElementById('divSlicer').value;
        const dept = document.getElementById('deptSlicer').value;
        const cls = document.getElementById('classSlicer').value;
        const sub = document.getElementById('subclassSlicer').value;

        let filtered = rawData.filter(row => {
            return (div === 'All' || row.Division === div) &&
                   (dept === 'All' || row['Dept Name'] === dept) &&
                   (cls === 'All' || row['Class name'] === cls) &&
                   (sub === 'All' || row['Subclass Name'] === sub) &&
                   (String(row.Year).toUpperCase() === currentPeriod);
        });
        renderTable(filtered);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding: 30px;">No results found.</td></tr>';
            return;
        }
        data.forEach(row => {
            const spd = cleanNum(row.SPD);
            const growth = cleanNum(row['Growth%']);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="class-name">${row['Class name']}</div>
                    <div class="sub-name">${row['Subclass Name']}</div>
                </td>
                <td class="val-num">
                    <div>${spd.toLocaleString(undefined, {maximumFractionDigits: 0})}</div>
                    <div class="growth-pill ${growth >= 0 ? 'pos' : 'neg'}">
                        ${growth >= 0 ? '▲' : '▼'} ${Math.abs(growth).toFixed(1)}%
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
